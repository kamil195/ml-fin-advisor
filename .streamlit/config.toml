[server]
# Disable all file watching
enableCORS = true
enableXsrfProtection = true
enableWebsocketCompression = false
maxUploadSize = 200
fileWatcherType = "none"  # Critical: Disable file watching

[logger]
level = "error"

[theme]
primaryColor = "#6366F1"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8FAFC"
textColor = "#1E293B"
font = "sans serif"
