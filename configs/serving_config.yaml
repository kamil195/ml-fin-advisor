# ML Fin-Advisor — Serving Configuration
# API & caching settings (SPEC §11)

api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  cors_origins: ["*"]
  rate_limit:
    requests_per_minute: 600
    burst: 50

inference:
  classification:
    model_format: "onnx"       # onnx | pytorch
    batch_size: 64
    max_latency_ms: 50
    confidence_threshold: 0.5  # below this → flag for review
    top_k: 3

  forecasting:
    batch_schedule: "0 2 * * *"  # cron: 02:00 UTC daily
    max_latency_seconds: 5
    horizons: [30, 60, 90]

  budget:
    refresh_trigger: "on_demand"  # on_demand | monthly
    max_latency_seconds: 2

cache:
  redis:
    host: "localhost"
    port: 6379
    db: 0
    password: null              # set via REDIS_PASSWORD env var

  ttl:
    user_features: 21600        # 6 hours (seconds)
    forecasts: 86400            # 24 hours
    budget_recommendations: 604800  # 7 days
    shap_explanations: 2592000  # 30 days

  invalidation:
    user_features: "on_new_transaction"
    forecasts: "on_nightly_batch"
    budget: "on_preference_change_or_forecast_refresh"
    shap: "on_model_version_change"

model_registry:
  backend: "mlflow"
  tracking_uri: "http://localhost:5000"
  artifact_root: "s3://ml-fin-advisor/mlflow-artifacts"
