# ML Fin-Advisor — Model Configuration
# Hyperparameters for all modules (SPEC Appendix A)

classifier:
  text_tower:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    embedding_dim: 384
    projection_dim: 128
    freeze_backbone: true

  mlp:
    hidden_layers: [512, 256]
    activation: "gelu"
    dropout: 0.3
    batch_size: 2048
    learning_rate: 3.0e-4
    weight_decay: 1.0e-4
    epochs: 20
    scheduler: "cosine"
    focal_loss_gamma: 2.0
    label_smoothing: 0.05

  meta_learner:
    type: "lightgbm"
    num_leaves: 127
    max_depth: 8
    learning_rate: 0.05
    n_estimators: 500
    min_child_samples: 50
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0

forecaster:
  prophet:
    yearly_seasonality: true
    weekly_seasonality: true
    changepoint_prior_scale: 0.05

  nbeats:
    stack_types: ["trend", "seasonality", "generic"]
    blocks_per_stack: 3
    hidden_size: 256
    theta_dims: [4, 8, 4]
    lookback_multiple: 5

  tft:
    hidden_size: 64
    attention_heads: 4
    lstm_layers: 2
    dropout: 0.1
    learning_rate: 1.0e-3
    quantiles: [0.1, 0.5, 0.9]
    max_encoder_length: 52   # weeks
    max_prediction_length: 13  # weeks

recommender:
  optimization:
    solver: "scipy"          # or "cvxpy"
    savings_floor_pct: 0.10  # minimum 10% of income to savings
  feasibility:
    max_reduction_cap: 0.30  # no single category cut > 30%
    habit_weight: 0.4
    variance_weight: 0.35
    compliance_weight: 0.25

behavior:
  regime_detector:
    hazard_lambda: 0.0167   # 1/60
    min_regime_length_days: 14
  impulse_scorer:
    model_type: "logistic_regression"
    threshold: 0.5
  habit_index:
    alpha: 0.4
    beta: 0.35
    gamma: 0.25
    duration_cap_months: 12
  lifestyle_drift:
    baseline_window_days: 90
    comparison_window_days: 30
    sigma_threshold: 2.0
    consecutive_periods: 2
